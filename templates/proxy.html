{% extends "base.html" %}
{% block title %}{{ t('proxy.title') }} — Telethon{% endblock %}
{% block content %}
<h1>{{ t('proxy.title') }}</h1>
<form method="post">
    <div class="card">
        <h3>{{ t('proxy.socks5') }}</h3>
        <label>{{ t('proxy.host') }} <input name="socks5_host" value="{{ socks5_host }}"></label>
        <label>{{ t('proxy.port') }} <input name="socks5_port" value="{{ socks5_port }}"></label>
        <label>{{ t('proxy.user') }} <input name="socks5_user" value="{{ socks5_user }}"></label>
        <label>{{ t('proxy.password') }} <input name="socks5_password" type="password" value=""></label>
    </div>
    <div class="card">
        <h3>{{ t('proxy.mtproto') }}</h3>
        <label>{{ t('proxy.server') }} <input name="mtproto_server" value="{{ mtproto_server }}"></label>
        <label>{{ t('proxy.port') }} <input name="mtproto_port" value="{{ mtproto_port }}"></label>
        <label>{{ t('proxy.secret') }} <input name="mtproto_secret" value="{{ mtproto_secret }}"></label>
    </div>
    <button class="btn" type="submit">{{ t('proxy.save') }}</button>
</form>
{% endblock %}

{% extends "base.html" %}
{% block title %}Настройки — Telethon{% endblock %}
{% block content %}
<h1>Настройки</h1>
<form method="post">
    <div class="card">
        <h3>Парсер</h3>
        <label>
            <input type="checkbox" name="enabled" value="1" {% if config.enabled %}checked{% endif %}>
            Включён
        </label>
    </div>
    <div class="card">
        <h3>Безопасность</h3>
        <label>Пароль веб-панели <input name="admin_password" value="{{ admin_password }}" type="password"></label>
    </div>
    <button class="btn" type="submit">Сохранить</button>
</form>
{% endblock %}

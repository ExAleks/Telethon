{% extends "base.html" %}
{% block title %}{{ t('settings.title') }} — Telethon{% endblock %}
{% block content %}
<h1>{{ t('settings.title') }}</h1>
<form method="post">
    <div class="card">
        <h3>{{ t('settings.parser') }}</h3>
        <label>
            <input type="checkbox" name="enabled" value="1" {% if config.enabled %}checked{% endif %}>
            {{ t('settings.enabled') }}
        </label>
    </div>
    <div class="card">
        <h3>{{ t('settings.security') }}</h3>
        <label>{{ t('settings.admin_password') }} <input name="admin_password" value="{{ admin_password }}" type="password"></label>
    </div>
    <button class="btn" type="submit">{{ t('settings.save') }}</button>
</form>
{% endblock %}
